# ERP Tienda — entorno local de desarrollo
# Uso: docker compose up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: erp-tienda-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-6561}
      POSTGRES_DB: ${POSTGRES_DB:-ERPTienda}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-sa} -d ${POSTGRES_DB:-ERPTienda}']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
